name: Try GoldenCheck

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        required: true
        type: choice
        options:
          - Quick Demo
          - DQBench Benchmark
        default: "Quick Demo"
      csv_url:
        description: "URL to a CSV file (Quick Demo only — leave blank for built-in sample)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  quick-demo:
    if: inputs.mode == 'Quick Demo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Run built-in demo
        if: inputs.csv_url == ''
        run: python examples/scan_and_profile.py
      - name: Download user CSV
        if: inputs.csv_url != ''
        run: curl -sL -o user_data.csv "$CSV_URL"
        env:
          CSV_URL: ${{ inputs.csv_url }}
      - name: Scan user CSV
        if: inputs.csv_url != ''
        run: goldencheck scan user_data.csv --no-tui --json

  dqbench:
    if: inputs.mode == 'DQBench Benchmark'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . dqbench
      - name: Run DQBench Detect benchmark
        run: python examples/benchmark.py
