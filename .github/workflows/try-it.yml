name: Try GoldenCheck

on:
  workflow_dispatch:
    inputs:
      csv_url:
        description: "URL to a CSV file (or leave blank for built-in demo)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Run built-in demo
        if: inputs.csv_url == ''
        run: goldencheck demo --no-tui
      - name: Download user CSV
        if: inputs.csv_url != ''
        run: curl -sL -o user_data.csv "$CSV_URL"
        env:
          CSV_URL: ${{ inputs.csv_url }}
      - name: Scan user CSV
        if: inputs.csv_url != ''
        run: goldencheck scan user_data.csv --no-tui --json
